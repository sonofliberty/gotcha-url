framework:
    html_sanitizer:
        sanitizers:
            page_content:
                allow_safe_elements: true
                allow_relative_links: true
                allow_relative_medias: true
                allowed_link_schemes: ['http', 'https', 'mailto', 'tel']
                allowed_media_schemes: ['http', 'https']
                allow_elements:
                    style: ['type', 'media']
                allow_attributes:
                    class: '*'
                    style: '*'
                drop_elements:
                    - script
                    - iframe
                    - object
                    - embed
                    - form
                    - input
                    - button
                    - textarea
                    - select
                    - option
                    - base
                    - frame
                    - frameset
                    - applet
                force_attributes:
                    a:
                        rel: 'noopener noreferrer'
