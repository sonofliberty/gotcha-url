parameters:
    # Single source of truth for the public {slug} URL pattern.
    # Referenced from config/packages/security.yaml and the route attribute on
    # App\Controller\RedirectController. Reserved names mirror App\Service\LinkCreator::RESERVED_SLUGS.
    app.slug_pattern: '(?!login$|logout$|register$|dashboard$)[a-zA-Z0-9]{4,10}'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $secret: '%kernel.secret%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
